name: SERDOS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: serdos_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: pdo, pdo_mysql, mbstring, openssl, tokenizer, xml, ctype, json, bcmath

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend-web/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: backend-api/vendor
        key: ${{ runner.os }}-php-${{ hashFiles('backend-api/composer.lock') }}
        restore-keys: ${{ runner.os }}-php-

    - name: Install PHP dependencies
      run: |
        cd backend-api
        composer install --no-progress --prefer-dist --optimize-autoloader --ignore-platform-reqs

    - name: Install Node.js dependencies
      run: |
        cd frontend-web
        npm ci

    - name: Install Python dependencies
      run: |
        cd ai-similarity-engine
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Copy environment file
      run: |
        cd backend-api
        cp .env.ci .env
        php artisan key:generate

    - name: Run database migrations
      run: |
        cd backend-api
        php artisan migrate --force
        php artisan db:seed --force

    - name: Run PHP tests
      run: |
        cd backend-api
        php artisan test

    - name: Build frontend
      run: |
        cd frontend-web
        npm run build

    - name: Run frontend tests
      run: |
        cd frontend-web
        npm run test:ci

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to production
      run: |
        echo "Deployment would happen here"
        echo "Example: rsync to production server, restart services, etc."
