name: Deploy to Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend-web
          npm ci

      - name: Build frontend
        run: |
          cd frontend-web
          npm run build

      - name: Copy build to Laravel public
        run: |
          cp -r frontend-web/dist/* backend-api/public/
          cp -r frontend-web/dist/assets backend-api/public/assets/ 2>/dev/null || true

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy Frontend to Public HTML
        run: |
          lftp -c "
            set ssl:verify-certificate false
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}
            mkdir -f public_html
            mirror -R backend-api/public/ public_html/
          "
